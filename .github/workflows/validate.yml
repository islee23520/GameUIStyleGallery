name: Validate StyleGallery

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate StyleGallery contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Syntax and whitespace
        run: |
          node -c scripts/generate-patterns.mjs
          node -c scripts/pattern-data.mjs
          node -c scripts/validate-okf.mjs
          node -c scripts/test-validate-okf.mjs
          node -c scripts/validate-patterns.mjs
          node -c scripts/test-validate-patterns.mjs
          node -c scripts/validate-links.mjs
          node -c scripts/validate-catalog.mjs
          node -c scripts/validate-ia.mjs
          node -c scripts/test-validate-ia.mjs
          node -c scripts/validate-vocabulary.mjs
          node -c scripts/test-validate-vocabulary.mjs
          node -c scripts/validate-governance.mjs
          node -c scripts/test-validate-governance.mjs
          node -c scripts/validate-domains.mjs
          node -c scripts/test-validate-domains.mjs
          node -c scripts/validate-unity-org-wiki.mjs
          node -c scripts/test-validate-unity-org-wiki.mjs
          node -c scripts/validate-unity-org-terms.mjs
          node -c scripts/test-validate-unity-org-terms.mjs
          node -c scripts/validate-webpage-workflow.mjs
          node -c scripts/test-validate-webpage-workflow.mjs
          node -c scripts/validate-consumer-reference.mjs
          node -c scripts/test-validate-consumer-reference.mjs
          git diff --check

      - name: Generated artifacts are current
        run: |
          node scripts/generate-patterns.mjs
          git diff --exit-code

      - name: OKF structure validation
        run: |
          node scripts/validate-okf.mjs --json
          node scripts/test-validate-okf.mjs --json

      - name: Pattern contract validation
        run: |
          node scripts/validate-patterns.mjs --min-count 46 --json

      - name: Markdown link check
        run: node scripts/validate-links.mjs --json

      - name: Information architecture check
        run: |
          node scripts/validate-ia.mjs --json
          node scripts/test-validate-ia.mjs --json

      - name: Vocabulary and scannability check
        run: |
          node scripts/validate-vocabulary.mjs --json
          node scripts/test-validate-vocabulary.mjs --json

      - name: Governance lifecycle check
        run: |
          node scripts/validate-governance.mjs --json
          node scripts/test-validate-governance.mjs --json

      - name: Domain topology and provenance check
        run: |
          node scripts/validate-domains.mjs --json
          node scripts/test-validate-domains.mjs

      - name: Unity organization compressed wiki check
        run: |
          node scripts/validate-unity-org-wiki.mjs --json
          node scripts/test-validate-unity-org-wiki.mjs

      - name: Unity organization term lexicon check
        run: |
          node scripts/validate-unity-org-terms.mjs --json
          node scripts/test-validate-unity-org-terms.mjs

      - name: Consumer reference receiver contract
        run: |
          node scripts/validate-consumer-reference.mjs --json
          node scripts/test-validate-consumer-reference.mjs --json

      - name: Webpage workflow check
        run: |
          node scripts/validate-webpage-workflow.mjs --json
          node scripts/test-validate-webpage-workflow.mjs --json

      - name: Pattern count and category coverage
        run: node scripts/validate-catalog.mjs --json

      - name: Pattern adversarial fixtures
        run: node scripts/test-validate-patterns.mjs --json
